<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#09090b; --panel:#111114; --border:#26262b;
    --ink:#eceef1; --dim:#94949c; --accent:#7c6cf0; --good:#2fd67a; --bad:#ff5c5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh;}
  header{padding:22px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;}
  .logo{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.05rem;}
  .logo b{color:var(--accent);}
  nav{display:flex; gap:6px; flex-wrap:wrap;}
  nav button{
    background:transparent; border:1px solid var(--border); color:var(--dim);
    padding:9px 16px; border-radius:100px; font-family:'IBM Plex Mono',monospace; font-size:0.78rem;
    cursor:pointer; transition:all .2s;
  }
  nav button.active, nav button:hover{color:var(--ink); border-color:var(--accent); background:rgba(124,108,240,0.1);}
  main{max-width:760px; margin:0 auto; padding:40px 20px 80px;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:30px; margin-bottom:20px;}
  .card h2{font-size:1.3rem; margin-bottom:6px;}
  .card .sub{color:var(--dim); font-size:0.88rem; margin-bottom:26px;}
  label{display:block; font-size:0.8rem; color:var(--dim); margin-bottom:6px; margin-top:16px;}
  label:first-of-type{margin-top:0;}
  input, select{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border);
    background:#0d0d10; color:var(--ink); font-family:'Inter',sans-serif; font-size:0.95rem;
  }
  input:focus, select:focus{outline:none; border-color:var(--accent);}
  .btn{
    margin-top:24px; width:100%; padding:13px; border-radius:10px; border:none;
    background:var(--accent); color:#fff; font-weight:600; font-size:0.95rem; cursor:pointer;
    transition:opacity .2s;
  }
  .btn:hover{opacity:0.88;}
  .btn.danger{background:var(--bad);}
  .msg{margin-top:14px; padding:12px 14px; border-radius:10px; font-size:0.85rem; display:none;}
  .msg.show{display:block;}
  .msg.ok{background:rgba(47,214,122,0.12); color:var(--good); border:1px solid rgba(47,214,122,0.3);}
  .msg.err{background:rgba(255,92,92,0.12); color:var(--bad); border:1px solid rgba(255,92,92,0.3);}
  table{width:100%; border-collapse:collapse; margin-top:10px;}
  th, td{text-align:left; padding:12px 10px; font-size:0.85rem; border-bottom:1px solid var(--border);}
  th{color:var(--dim); font-weight:500; font-family:'IBM Plex Mono',monospace; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em;}
  .empty{color:var(--dim); text-align:center; padding:30px 0; font-size:0.9rem;}
  .tag{display:inline-block; padding:3px 10px; border-radius:100px; font-size:0.72rem; font-family:'IBM Plex Mono',monospace;}
  .tag.deposit{background:rgba(47,214,122,0.15); color:var(--good);}
  .tag.withdraw{background:rgba(255,92,92,0.15); color:var(--bad);}
  .view{display:none;} .view.active{display:block;}
  footer{text-align:center; padding:30px; color:var(--dim); font-size:0.8rem; font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>

<header>
  <div class="logo">Bank<b>App</b></div>
  <nav>
    <button data-view="new" class="active">+ New Account</button>
    <button data-view="deposit">↓ Deposit</button>
    <button data-view="withdraw">↑ Withdraw</button>
    <button data-view="accounts">≡ Accounts</button>
    <button data-view="history">◷ History</button>
  </nav>
</header>

<main>

  <div class="view active" id="view-new">
    <div class="card">
      <h2>Open New Account</h2>
      <p class="sub">Fill in the details below</p>
      <label>Full Name</label>
      <input type="text" id="newName" placeholder="e.g. Faizan Amjad">
      <label>Account Type</label>
      <select id="newType"><option>Savings</option><option>Current</option></select>
      <label>Initial Deposit (PKR)</label>
      <input type="number" id="newDeposit" placeholder="e.g. 5000" min="0">
      <label>Phone Number</label>
      <input type="text" id="newPhone" placeholder="e.g. 03204011763">
      <button class="btn" onclick="createAccount()">Create Account</button>
      <div class="msg" id="newMsg"></div>
    </div>
  </div>

  <div class="view" id="view-deposit">
    <div class="card">
      <h2>Deposit Funds</h2>
      <p class="sub">Add money to an existing account</p>
      <label>Account Number</label>
      <input type="text" id="depAcc" placeholder="e.g. ACC1001">
      <label>Amount (PKR)</label>
      <input type="number" id="depAmt" min="1">
      <button class="btn" onclick="deposit()">Deposit</button>
      <div class="msg" id="depMsg"></div>
    </div>
  </div>

  <div class="view" id="view-withdraw">
    <div class="card">
      <h2>Withdraw Funds</h2>
      <p class="sub">Deduct from an existing account</p>
      <label>Account Number</label>
      <input type="text" id="wdAcc" placeholder="e.g. ACC1001">
      <label>Amount (PKR)</label>
      <input type="number" id="wdAmt" min="1">
      <button class="btn danger" onclick="withdraw()">Withdraw</button>
      <div class="msg" id="wdMsg"></div>
    </div>
  </div>

  <div class="view" id="view-accounts">
    <div class="card">
      <h2>All Accounts</h2>
      <p class="sub" id="accCount">No accounts yet</p>
      <div id="accountsTable"></div>
    </div>
  </div>

  <div class="view" id="view-history">
    <div class="card">
      <h2>Transaction History</h2>
      <p class="sub">All deposits and withdrawals</p>
      <div id="historyTable"></div>
    </div>
  </div>

</main>

<footer>Bank Management System — data stored locally in your browser</footer>

<script>
function loadState(){
  return JSON.parse(localStorage.getItem('bankAppState') || '{"accounts":[],"transactions":[],"nextId":1001}');
}
function saveState(state){
  localStorage.setItem('bankAppState', JSON.stringify(state));
}
let state = loadState();

document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
    if(btn.dataset.view==='accounts') renderAccounts();
    if(btn.dataset.view==='history') renderHistory();
  });
});

function showMsg(id, text, ok){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'ok' : 'err');
  setTimeout(()=>el.classList.remove('show'), 3500);
}

function createAccount(){
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const deposit = parseFloat(document.getElementById('newDeposit').value) || 0;
  const phone = document.getElementById('newPhone').value.trim();

  if(!name){ showMsg('newMsg','Please enter the account holder name.', false); return; }
  if(deposit < 0){ showMsg('newMsg','Initial deposit cannot be negative.', false); return; }

  const accId = 'ACC' + state.nextId;
  state.nextId += 1;
  state.accounts.push({id:accId, name, type, phone, balance:deposit, createdAt:new Date().toISOString()});
  if(deposit > 0){
    state.transactions.push({acc:accId, type:'deposit', amount:deposit, date:new Date().toISOString(), note:'Initial deposit'});
  }
  saveState(state);
  showMsg('newMsg', `Account created successfully. Account number: ${accId}`, true);
  document.getElementById('newName').value='';
  document.getElementById('newDeposit').value='';
  document.getElementById('newPhone').value='';
}

function deposit(){
  const accId = document.getElementById('depAcc').value.trim().toUpperCase();
  const amt = parseFloat(document.getElementById('depAmt').value);
  const acc = state.accounts.find(a=>a.id===accId);
  if(!acc){ showMsg('depMsg','Account not found.', false); return; }
  if(!amt || amt<=0){ showMsg('depMsg','Enter a valid amount.', false); return; }
  acc.balance += amt;
  state.transactions.push({acc:accId, type:'deposit', amount:amt, date:new Date().toISOString(), note:'Deposit'});
  saveState(state);
  showMsg('depMsg', `PKR ${amt.toLocaleString()} deposited into ${accId}. New balance: PKR ${acc.balance.toLocaleString()}`, true);
  document.getElementById('depAmt').value='';
}

function withdraw(){
  const accId = document.getElementById('wdAcc').value.trim().toUpperCase();
  const amt = parseFloat(document.getElementById('wdAmt').value);
  const acc = state.accounts.find(a=>a.id===accId);
  if(!acc){ showMsg('wdMsg','Account not found.', false); return; }
  if(!amt || amt<=0){ showMsg('wdMsg','Enter a valid amount.', false); return; }
  if(amt > acc.balance){ showMsg('wdMsg','Insufficient balance.', false); return; }
  acc.balance -= amt;
  state.transactions.push({acc:accId, type:'withdraw', amount:amt, date:new Date().toISOString(), note:'Withdrawal'});
  saveState(state);
  showMsg('wdMsg', `PKR ${amt.toLocaleString()} withdrawn from ${accId}. New balance: PKR ${acc.balance.toLocaleString()}`, true);
  document.getElementById('wdAmt').value='';
}

function renderAccounts(){
  const container = document.getElementById('accountsTable');
  const countEl = document.getElementById('accCount');
  if(state.accounts.length === 0){
    countEl.textContent = 'No accounts yet';
    container.innerHTML = '<div class="empty">No accounts created yet.</div>';
    return;
  }
  countEl.textContent = `${state.accounts.length} account(s)`;
  let rows = state.accounts.map(a=>`
    <tr>
      <td>${a.id}</td>
      <td>${a.name}</td>
      <td>${a.type}</td>
      <td>${a.phone || '—'}</td>
      <td>PKR ${a.balance.toLocaleString()}</td>
    </tr>`).join('');
  container.innerHTML = `<table><thead><tr><th>Acc No.</th><th>Name</th><th>Type</th><th>Phone</th><th>Balance</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderHistory(){
  const container = document.getElementById('historyTable');
  if(state.transactions.length === 0){
    container.innerHTML = '<div class="empty">No transactions yet.</div>';
    return;
  }
  const sorted = [...state.transactions].sort((a,b)=> new Date(b.date) - new Date(a.date));
  let rows = sorted.map(t=>`
    <tr>
      <td>${t.acc}</td>
      <td><span class="tag ${t.type}">${t.type}</span></td>
      <td>PKR ${t.amount.toLocaleString()}</td>
      <td>${new Date(t.date).toLocaleString()}</td>
    </tr>`).join('');
  container.innerHTML = `<table><thead><tr><th>Account</th><th>Type</th><th>Amount</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>`;
}

renderAccounts();
renderHistory();
</script>
</body>
</html>
